## Registry of always-loaded rule units enumerated from CLAUDE.md.
##
## Stage 4 of instruction-surface-governance. Each [[rule]] is one mechanically
## enumerated unit at the granularity of: every `### `/`#### ` heading, every
## `**Bolded lead.**`-style rule paragraph, and every top-level numbered/bulleted
## imperative — per the stage's method step 1. Pure section-container `## `
## headings are NOT rule units by themselves (they group; the units inside them
## are), except where a `## ` section has no `### ` children, in which case the
## section-level paragraphs are the unit (Long-running jobs, Memory intro,
## Cost discipline, Instruction language, Instructions repository).
##
## Field contract, checked by rule-salience-report.py --check-registry:
##   id               stable kebab-case identity, independent of section location.
##   tier             0-4, per the Tier 0-4 model (meta.goal of the governing plan).
##   locator_heading  the exact heading LINE (with `#`/`##`/`###`/`####` prefix) the
##                    rule currently lives under. Must be verbatim-findable as a
##                    whole line in CLAUDE.md.
##   locator_phrase   a short, verbatim, markup-boundary-safe substring of the rule's
##                    own text. Must be verbatim-findable anywhere in CLAUDE.md
##                    (direction B of the drift gate). Chosen to sit entirely inside
##                    or entirely outside a `**bold**` span so it survives as a raw
##                    substring of the markdown source, not just the rendered text.
##   kernel_reason    REQUIRED, non-empty, for every tier == 0 entry; must be exactly
##                    "FRAME" or "NOT-NOTICING" (the two kernel-membership criteria).
##                    Empty for tier >= 1. An entry that can name neither is a
##                    demotion candidate for Phase 3, not a registry error.
##   delivery_kind    for tier >= 1 only. One of:
##                      "bracket_tag"        - a hook prefixes injected text with
##                                              literal `[tag]`; delivery_marker is
##                                              that bracketed tag.
##                      "agentctl_construct" - an agentctl subcommand/gate whose
##                                              invocation is observable as a literal
##                                              substring in a Bash tool_use input;
##                                              delivery_marker is that substring.
##                      "structured_hook"    - a PreToolUse hook that returns a
##                                              structured allow/deny JSON decision
##                                              with no narrative bracket tag. No
##                                              positive (ALLOW-path) firing signal
##                                              is currently logged anywhere on this
##                                              machine - see delivery_note. Always
##                                              reported UNINSTRUMENTED.
##                      "harness"            - enforced by the harness runtime itself
##                                              (context window, output caps), not by
##                                              a hook or agentctl. No session-level
##                                              marker exists. Always reported
##                                              UNINSTRUMENTED.
##   delivery_marker  literal search string for "bracket_tag"/"agentctl_construct";
##                    empty for "structured_hook"/"harness".
##   delivery_note    free-text detail: which hook/gate/subcommand, and any caveat
##                    about a secondary, unobservable backing mechanism.
##
## Enumerated from the CLAUDE.md text at commit e7006be (stage 3 HEAD), 217 lines.

[meta]
schema = "rule-registry/v1"
source_file = "CLAUDE.md"
tier_model = "0=always-loaded kernel, 1=engine gates/hooks, 2=JIT-injected prose, 3=skills, 4=memory leaves"
kernel_criteria = ["FRAME", "NOT-NOTICING"]
enumeration_granularity = "### /#### headings; **bolded-lead** rule paragraphs; top-level imperative bullets/numbered items; section-level paragraphs for ## sections with no ### children"

